<div class="auth-page">
    <div class="auth-left">
        <div class="auth-brand">
            <a routerLink="/" class="auth-logo">
                <span class="material-icons-round">bolt</span>
                <span>Electro<span class="accent">Serve</span></span>
            </a>
            <h1>Welcome Back</h1>
            <p>Sign in to manage your bookings or electrician profile</p>
        </div>
        <div class="auth-illustration">
            <span class="material-icons-round">electrical_services</span>
        </div>
    </div>

    <div class="auth-right">
        <div class="auth-form-wrapper">
            <h2>Sign In</h2>
            <p class="auth-subtitle">Enter your credentials to continue</p>

            <div class="role-toggle">
                <button [class.active]="role === 'customer'" (click)="role = 'customer'">Customer</button>
                <button [class.active]="role === 'electrician'" (click)="role = 'electrician'">Electrician</button>
            </div>

            <form (ngSubmit)="onSubmit()">
                @if (errorMessage()) {
                <div class="alert alert-danger" style="color: #dc3545; background-color: #f8d7da; padding: 10px; border-radius: 4px; border: 1px solid #f5c6cb; font-size: 14px; margin-bottom: 1rem;">
                    <span class="material-icons-round" style="font-size: 18px; vertical-align: text-bottom; margin-right: 5px;">error_outline</span>
                    {{ errorMessage() }}
                </div>
                }
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="you@email.com" [(ngModel)]="email"
                        name="email" required>
                </div>
                <div class="form-group">
                    <div class="label-row">
                        <label>Password</label>
                        <a href="#" class="forgot-pwd">Forgot password?</a>
                    </div>
                    <input type="password" class="form-control" placeholder="Enter your password" [(ngModel)]="password"
                        name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" [disabled]="isLoading()">
                    {{ isLoading() ? 'Signing In...' : 'Sign In' }}
                </button>
            </form>

            <div class="social-divider"><span>or continue with</span></div>
            <div class="social-buttons">
                <button class="social-btn"><span class="material-icons-round">g_mobiledata</span> Google</button>
                <button class="social-btn"><span class="material-icons-round">facebook</span> Facebook</button>
            </div>

            <p class="auth-switch">Don't have an account? <a routerLink="/register">Sign Up</a></p>
        </div>
    </div>
</div>
