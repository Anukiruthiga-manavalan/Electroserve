<nav class="navbar" [class.scrolled]="isScrolled()">
    <div class="navbar-inner container">
        <!-- Logo -->
        <a routerLink="/" class="logo" (click)="closeMobileMenu()">
            <span class="material-icons-round logo-icon">electric_bolt</span>
            <span class="logo-text">Electro<span class="logo-accent">Site</span></span>
        </a>

        <!-- Desktop Nav -->
        <ul class="nav-links">
            <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
            <li><a routerLink="/find-electricians" routerLinkActive="active">Find Electricians</a></li>
            <li><a routerLink="/services" routerLinkActive="active">Services</a></li>
            <li><a routerLink="/about" routerLinkActive="active">About</a></li>
            <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
        </ul>

        <!-- CTA Buttons -->
        <div class="nav-actions">
            <a routerLink="/login" class="btn-login">Login</a>
            <a routerLink="/register" class="btn btn-primary btn-sm">Sign Up</a>
        </div>

        <!-- Mobile Toggle -->
        <button class="mobile-toggle" (click)="toggleMobileMenu()" [attr.aria-label]="'Toggle menu'">
            <span class="material-icons-round">{{ mobileMenuOpen() ? 'close' : 'menu' }}</span>
        </button>
    </div>

    <!-- Mobile Menu -->
    @if (mobileMenuOpen()) {
    <div class="mobile-menu">
        <ul>
            <li><a routerLink="/" (click)="closeMobileMenu()">Home</a></li>
            <li><a routerLink="/find-electricians" (click)="closeMobileMenu()">Find Electricians</a></li>
            <li><a routerLink="/services" (click)="closeMobileMenu()">Services</a></li>
            <li><a routerLink="/about" (click)="closeMobileMenu()">About</a></li>
            <li><a routerLink="/contact" (click)="closeMobileMenu()">Contact</a></li>
            <li>
                <div class="nav-right" [class.active]="mobileMenuOpen()">
                    @if (authService.currentUser()) {
                    <a routerLink="/profile" class="btn btn-secondary btn-sm" (click)="closeMobileMenu()">Profile</a>
                    <button class="btn btn-primary btn-sm" (click)="logout(); closeMobileMenu()">Logout</button>
                    } @else {
                    <a routerLink="/login" class="btn btn-secondary btn-sm" (click)="closeMobileMenu()">Log In</a>
                    <a routerLink="/register" class="btn btn-primary btn-sm" (click)="closeMobileMenu()">Sign Up</a>
                    }
                </div>
            </li>
        </ul>
    </div>
    }
</nav>
