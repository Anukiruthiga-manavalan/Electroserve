# ============================================
# ElectroServe — Application Configuration
# ============================================

spring.application.name=ElectroServe

# ---- Active Profile ----
# Use 'dev' for H2 in-memory, 'prod' for MySQL
spring.profiles.active=dev

# ---- Server ----
server.port=${PORT:8080}

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ---- JWT ----
jwt.secret=ElectroServeSecretKeyForJWTTokenGeneration2024MustBeAtLeast256Bits!!
jwt.expiration=86400000

# ---- CORS ----
cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,https://electroserve.onrender.com

# ============================================
# DEV profile — H2 in-memory database
# ============================================
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:electroserve
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
